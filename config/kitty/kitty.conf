# ── Kitty Config ──
# Theme: based on wallpaper (dark grey, blood red, silver, dark purple)

# Font
font_family      Ubuntu Nerd Font
font_size        10

# Cursor
cursor           #ffffff
cursor_text_color #0a0a0a
cursor_shape     block
cursor_blink_interval 0

# Window
background_opacity 0.9
window_padding_width 8

# Colors
background            #0a0a0a
foreground            #d0d0d0

selection_background  #8b0000
selection_foreground  #f0f0f0

# Black
color0  #2a2a2a
color8  #555555

# Red
color1  #cc0000
color9  #ff5555

# Green
color2  #55aa55
color10 #55ff55

# Yellow
color3  #aaaa00
color11 #ffff55

# Blue
color4  #5555aa
color12 #5555ff

# Magenta
color5  #aa55aa
color13 #ff55ff

# Cyan
color6  #55aaaa
color14 #55ffff

# White
color7  #d0d0d0
color15 #ffffff

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
active_tab_background   #8b0000
active_tab_foreground   #ffffff
inactive_tab_background #1a1a1a
inactive_tab_foreground #666666

shell /usr/bin/fish
