# ── Important ──
[core]
plugins = autostart animate command expo switcher grid move resize wrot oswitch wm-actions vswitch vswipewsets workarounds session-lock window-rules grid vswipe pixdecor scale input-method-v1 foreign-toplevel
vwidth = 2
vheight = 2

[alpha]
min_value = 0.95

# ── Autostart ──
[autostart]
waybar = waybar
nm-applet = nm-applet --indicator
blueman = blueman-applet
mako = mako
eww = eww daemon
eww_test = /home/momoi/.config/eww/script/eww_fixed.sh
polkit = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
wall = swaybg -i /usr/share/backgrounds/wallhaven-pklmxm.jpg
bright = brightnessctl set 10%
env = pkill wf-panel
#vpn = protonvpn-app

[command]
# ── Terminal ──
binding_terminal = <ctrl> <alt> KEY_T
command_terminal = kitty

# ── App Launcher ──
binding_launcher = <super> KEY_SPACE
command_launcher = rofi -show drun -theme /home/momoi/.config/rofi/launcher/style-1.rasi

# ── Apps ──
binding_filemanager = <super> KEY_E
command_filemanager = thunar

binding_browser = <super> KEY_B
command_browser = firefox

# ── Screenshot ──
binding_screenshot = KEY_PRINT
command_screenshot = grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

binding_screenshot_area = <super> <shift> KEY_S
command_screenshot_area = grim - | satty -f -

# ── Session ──
#binding_lock = <super> KEY_L
#command_lock = waylock

binding_logout = <ctrl> <alt> KEY_DELETE
command_logout = /home/momoi/.config/rofi/powermenu/powermenu.sh

# ── Reload ──
#binding_reload = <ctrl> <alt> KEY_R
#command_reload = wayfire

# ── Brightness ──
binding_bright_up = KEY_BRIGHTNESSUP
command_bright_up = brightnessctl set +5%

binding_bright_down = KEY_BRIGHTNESSDOWN
command_bright_down = brightnessctl set 5%-

# ── Volume ──
binding_vol_up = KEY_VOLUMEUP
command_vol_up = pactl set-sink-volume @DEFAULT_SINK@ +5%

binding_vol_down = KEY_VOLUMEDOWN
command_vol_down = pactl set-sink-volume @DEFAULT_SINK@ -5%

binding_vol_mute = KEY_MUTE
command_vol_mute = pactl set-sink-mute @DEFAULT_SINK@ toggle

binding_action_center = <super> KEY_A
command_action_center = if [ ! -f /tmp/eww_ex.lock ]; then touch /tmp/eww_ex.lock; eww active-windows | grep -q "example" && eww close example media-player || eww open-many example media-player; sleep 0.2; rm /tmp/eww_ex.lock; fi

[wm-actions]
toggle_fullscreen = <super> KEY_F
toggle_maximize = <super> KEY_M
close = <super> KEY_Q
minimize = <super> KEY_H
toggle_always_on_top = <super> KEY_T

[vswipe]
delta_threshold = 24
fingers = 3
speed_factor = 256

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[grid]
# ── Snap ──
# Left / Right
slot_l  = <super> KEY_LEFT
slot_r  = <super> KEY_RIGHT

# Top / Bottom (fullwidth)
slot_t  = <super> KEY_UP
slot_b  = <super> KEY_DOWN

# Corners
slot_tl = <super> <shift> KEY_LEFT
slot_tr = <super> <shift> KEY_UP
slot_bl = <super> <shift> KEY_DOWN
slot_br = <super> <shift> KEY_RIGHT

# Center / maximize
slot_c  = <super> KEY_UP

[switcher]
# Window switcher keren (built-in wayfire)
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB
view_thumbnail_size = 0.3
touch_sensitivity = 1.0

[expo]
toggle = <super> KEY_TAB

[scale]
toggle = <super> KEY_W

[oswitch]
next_workspace = <ctrl> <alt> KEY_RIGHT
prev_workspace = <ctrl> <alt> KEY_LEFT

[animate]
open_animation = zoom
close_animation = zoom
minimize_animation = zoom
duration = 250

# ── Decoration ──
[pixdecor]
accent_color =
active_color =
active_title_color =
always_decorate = none
animate = false
bg_color = \#1A1A1AFF
bg_text_color = \#B3B3B3FF
border_size = 0
button_close_image = /home/momoi/.config/wayfire/close.png
button_color = \#FFFFFFFF
button_layout = minimize maximize close
button_line_thickness = 0.700000
button_maximize_image = /home/momoi/.config/wayfire/maximize.png
button_minimize_image = /home/momoi/.config/wayfire/minimize.png
button_spacing = 5
button_x_offset = 0
button_y_offset = 0
csd_titlebar_height = 32
effect_color = \#E01C24FF
effect_type = none
enable_shade = false
fg_color = \#1A1A1AFF
fg_text_color = \#FFFFFFFF
ignore_views = none
inactive_color =
inactive_shadow_color =
inactive_title_color =
maximized_borders = false
maximized_shadows = false
overlay_engine = rounded_corners
rounded_corner_radius = 7
shade_duration = 1000ms sigmoid
shade_modifier = <ctrl> <super>
shade_toggle =
shadow_color = \#00000040
shadow_radius = 0
title_font = Sans Bold 10
title_height = 28
title_text_align = 1
titlebar = true

# ── Workarounds ──
[blur]
method = kawase
kawase_iterations = 1
kawase_degrade = 10

[fisheye]
radius = 200
zoom = 7 

[alpha]
min_value = 0.95
